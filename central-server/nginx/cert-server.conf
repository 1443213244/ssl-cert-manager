# SSL证书分发服务器 Nginx 配置
# 复制到 /etc/nginx/conf.d/ 目录

# 限流配置（防止并发过高）
limit_req_zone $binary_remote_addr zone=cert_limit:10m rate=5r/s;

server {
    listen 80;
    server_name cert.cloud2345.com;
    
    # HTTP 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cert.cloud2345.com;

    # SSL证书（使用自己颁发的证书）
    ssl_certificate     /opt/cert-center/certs/cloud2345.com/fullchain.pem;
    ssl_certificate_key /opt/cert-center/certs/cloud2345.com/privkey.pem;

    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 访问日志
    access_log /var/log/nginx/cert-server-access.log;
    error_log /var/log/nginx/cert-server-error.log;

    # IP白名单（可选，根据需要启用）
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # allow 192.168.0.0/16;
    # deny all;

    # 证书文件下载
    location /certs/ {
        limit_req zone=cert_limit burst=10 nodelay;
        
        # Token验证
        set $valid_token "your-secret-token-2024";
        if ($http_x_cert_token != $valid_token) {
            return 403;
        }

        alias /opt/cert-center/certs/;
        autoindex off;
        
        # 只允许下载特定文件类型
        location ~ \.(pem|json)$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 禁止其他文件
        location ~ /\. {
            deny all;
        }
    }

    # Agent脚本下载（无需Token）
    location /agent/ {
        alias /opt/cert-center/agent/;
        autoindex off;
        
        location ~ \.sh$ {
            add_header Content-Type "text/plain; charset=utf-8";
        }
    }

    # 健康检查
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # 版本信息（无需Token，仅用于检查）
    location = /certs/cloud2345.com/version.json {
        # 版本检查可以不需要Token
        set $check_token "1";
        if ($http_x_cert_token = "your-secret-token-2024") {
            set $check_token "0";
        }
        # 如果需要Token才能查看版本，取消下面注释
        # if ($check_token = "1") {
        #     return 403;
        # }
        
        alias /opt/cert-center/certs/cloud2345.com/version.json;
        add_header Cache-Control "no-cache";
    }
}
